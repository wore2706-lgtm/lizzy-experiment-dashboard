<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TikTok OAuth — Lizzy AI</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 40px auto; padding: 20px; background: #0a0f1a; color: #f1f5f9; }
        .code-box { background: #1a2332; padding: 20px; border-radius: 12px; word-break: break-all; font-family: monospace; font-size: 16px; margin: 15px 0; border: 1px solid #3b82f6; user-select: all; }
        h1 { color: #14b8a6; }
        .success { color: #22c55e; font-size: 1.2rem; }
        .error { color: #ef4444; }
        .hint { color: #94a3b8; font-size: 0.9rem; margin-top: 10px; }
        .copy-btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .copy-btn:hover { background: #2563eb; }
    </style>
</head>
<body>
    <h1>🎵 TikTok OAuth Callback</h1>
    <div id="result">Verarbeite...</div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const el = document.getElementById('result');
        
        if (code) {
            el.innerHTML = `
                <p class="success">✅ Authorization Code erhalten!</p>
                <p>Kopiere diesen Code und schicke ihn per Telegram:</p>
                <div class="code-box" id="code-text">${code}</div>
                <button class="copy-btn" onclick="navigator.clipboard.writeText('${code}');this.textContent='✅ Kopiert!'">📋 Code kopieren</button>
                <p class="hint">⏰ Der Code ist nur 10 Minuten gültig!</p>
            `;
        } else if (error) {
            el.innerHTML = `<p class="error">❌ Fehler: ${error}</p><p>${params.get('error_description') || ''}</p>`;
        } else {
            el.innerHTML = '<p class="error">Kein Code. Bitte über den TikTok-Auth-Link autorisieren.</p>';
        }
    </script>
</body>
</html>
